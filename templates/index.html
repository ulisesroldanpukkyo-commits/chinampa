<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Chinampa PlantScan AI 🌿</title>
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#2d5a27">
</head>
<body>
    <main class="container">
        <header class="brand-header">
            <img src="{{ url_for('static', filename='icon-192.png') }}" alt="Logo" class="logo-inline">
            <h1 class="title-text">Chinampa PlantScan AI 🌿</h1>
        </header>

        <div id="seasonBanner" class="season-banner"></div>

        <div id="paneCamera" class="pane">
            <div class="cam-wrap">
                <video id="camVideo" autoplay playsinline muted></video>
                <canvas id="camCanvas" class="hidden"></canvas>
                <img id="filePreview" class="hidden">
            </div>
            
            <div class="cam-controls">
                <button id="btnStart" class="primary">Encender Cámara</button>
                <button id="btnShot" class="primary hidden" style="background:#555;">Tomar Foto</button>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <label for="fileInput" style="display:block; text-align:center; padding:10px; cursor:pointer; color:#2d5a27; font-weight:bold;">📁 Seleccionar de Galería</label>
                <input id="fileInput" type="file" accept="image/*" class="hidden">
                <button id="btnUse" class="primary hidden" style="background-color: #4caf50;">🔍 Analizar Planta</button>
            </div>
        </div>

        <div id="progress" class="progress hidden">
            <div class="loader-container">
                <div class="spinner"></div>
                <p id="loadingMessage" class="loading-text">Consultando al Doctor Botánico...</p>
            </div>
        </div>

        <div id="results" class="results"></div>

        <div id="historySection" class="history-container hidden">
            <h3 style="color:var(--primary); margin:0;">🌱 Mi Jardín</h3>
            <div id="historyList" class="history-list"></div>
            <button onclick="clearHistory()" style="background:none; border:none; color:#999; font-size:0.7rem; margin-top:10px; text-decoration:underline;">Borrar historial</button>
        </div>

        <footer class="main-footer" style="margin-top: 50px; padding: 40px 20px; background: #fcfcfc; border-top: 1px solid #f0f0f0; border-radius: 30px 30px 0 0; text-align: center;">
            <div class="footer-title" style="color: var(--primary); font-size: 1.1rem; font-weight: 800; margin-bottom: 25px; letter-spacing: 1px;">CONTACTO CHINAMPA</div>
            <div class="contact-info" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;">
                <div class="contact-item" style="color: #666; font-size: 0.95rem;">
                    <span>📍</span> <span>Xochimilco, Iztapalapa, Iztacalco, CDMX</span>
                </div>
                <a href="https://wa.me/525620238734" target="_blank" style="color: #25d366; font-weight: bold; text-decoration: none; font-size: 1rem;">
                    <span>🟢</span> WhatsApp: 5620238734
                </a>
            </div>
            <div class="footer-credits" style="border-top: 1px solid #eee; padding-top: 25px;">
                <p style="font-style: italic; color: #444; font-size: 0.95rem; margin: 0; font-weight: 500;">
                    Raíces Neuronales: Inteligencia para tu Jardín 🧬
                </p>
                <p style="margin: 10px 0 5px 0; font-size: 0.85rem; color: #888;"><b>© 2026 Chinampa | Ing. Ulises Roldán Olivares</b></p>
            </div>
        </footer>
    </main>

<script>
    const v = document.getElementById("camVideo");
    const c = document.getElementById("camCanvas");
    const imgPrev = document.getElementById("filePreview");
    const btnStart = document.getElementById("btnStart");
    const btnShot = document.getElementById("btnShot");
    const btnUse = document.getElementById("btnUse");
    const fileInput = document.getElementById("fileInput");
    const loadingMsg = document.getElementById("loadingMessage");
    const progress = document.getElementById("progress");

    function updateSeasonBanner() {
        const month = new Date().getMonth() + 1; 
        const banner = document.getElementById("seasonBanner");
        if (month >= 3 && month <= 5) {
            banner.className = "season-banner season-spring";
            banner.innerHTML = "🌸 <b>Temporada de Primavera:</b> Tus plantas están en plena floración. Aplica fertilizante <b>cada 15 días</b>.";
        } else if (month >= 6 && month <= 8) {
            banner.className = "season-banner season-summer";
            banner.innerHTML = "☀️ <b>Temporada de Verano:</b> Mucho calor. Revisa el riego de tus suculentas con más frecuencia.";
        } else {
            banner.className = "season-banner season-spring";
            banner.innerHTML = "🌿 <b>Temporada Activa:</b> En <b>Chinampa</b> tenemos el sustrato mineral ideal para tus plantas.";
        }
    }

    // --- CORRECCIÓN: Guardar consejos en el historial ---
    function saveToHistory(plantData) {
        let history = JSON.parse(localStorage.getItem('chinampa_garden') || '[]');
        
        const newEntry = {
            id: Date.now(),
            nombre: plantData.nombre_comun,
            cientifico: plantData.nombre_cientifico,
            fecha: new Date().toLocaleDateString(),
            timestamp: Date.now(),
            cuidados: {
                sol: plantData.sol,
                riego: plantData.riego,
                sustrato: plantData.sustrato,
                consejos: plantData.consejos // <--- Guardamos el array de consejos
            }
        };

        history = history.filter(item => item.nombre !== newEntry.nombre);
        history.unshift(newEntry);
        localStorage.setItem('chinampa_garden', JSON.stringify(history.slice(0, 10))); 
        renderHistory();
    }

    // --- CORRECCIÓN: Función para mostrar detalles incluyendo consejos ---
    function showCareDetails(id) {
        const list = JSON.parse(localStorage.getItem('chinampa_garden') || '[]');
        const item = list.find(p => p.id === id);
        
        if (item) {
            const listaConsejos = (item.cuidados.consejos && item.cuidados.consejos.length > 0) 
                ? "\n• " + item.cuidados.consejos.join("\n• ") 
                : "\nNo hay consejos adicionales.";

            alert(`📋 GUÍA DE CUIDADOS: ${item.nombre}\n\n` +
                  `☀️ Sol: ${item.cuidados.sol}\n` +
                  `💧 Riego: ${item.cuidados.riego}\n` +
                  `🪴 Tierra: ${item.cuidados.sustrato}\n\n` +
                  `💡 CONSEJOS CHINAMPA:${listaConsejos}`);
        }
    }

    function renderHistory() {
        const list = JSON.parse(localStorage.getItem('chinampa_garden') || '[]');
        const container = document.getElementById("historySection");
        const listDiv = document.getElementById("historyList");
        
        if (list.length > 0) {
            container.classList.remove("hidden");
            listDiv.innerHTML = list.map(item => {
                const meses = Math.floor((Date.now() - item.timestamp) / (1000 * 60 * 60 * 24 * 30));
                const alerta = meses >= 6 ? `<div style="font-size:0.7rem; color:#e67e22; font-weight:bold;">⚠️ Toca renovar sustrato</div>` : '';

                return `
                    <div class="history-card">
                        <div class="history-header">
                            <div>
                                <span class="history-name">${item.nombre}</span>
                                <div class="history-meta">Adoptada el ${item.fecha}</div>
                            </div>
                            ${alerta}
                        </div>
                        <div class="history-actions">
                            <button class="btn-mini btn-care" onclick="showCareDetails(${item.id})">📋 Ver Cuidados</button>
                            <a href="https://wa.me/525620238734?text=Hola!%20Tengo%20dudas%20sobre%20mi%20${item.nombre}" 
                               class="btn-mini btn-wa-mini">💬 Consultar</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
    }

    function clearHistory() {
        if(confirm("¿Deseas borrar tu jardín guardado?")) {
            localStorage.removeItem('chinampa_garden');
            document.getElementById("historySection").classList.add("hidden");
        }
    }

    btnStart.onclick = async () => {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = s;
            v.classList.remove("hidden");
            imgPrev.classList.add("hidden");
            btnStart.classList.add("hidden");
            btnShot.classList.remove("hidden");
        } catch (e) { alert("Error al abrir cámara: " + e); }
    };

    btnShot.onclick = () => {
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext("2d").drawImage(v, 0, 0);
        c.toBlob(b => { 
            window.selectedFile = new File([b], "captura.jpg", {type: "image/jpeg"});
            btnUse.classList.remove("hidden");
        }, "image/jpeg", 0.8);
        c.classList.remove("hidden"); 
        v.classList.add("hidden");
        btnShot.classList.add("hidden");
    };

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            window.selectedFile = file;
            imgPrev.src = URL.createObjectURL(file);
            imgPrev.classList.remove("hidden"); 
            v.classList.add("hidden");
            btnStart.classList.add("hidden");
            btnUse.classList.remove("hidden");
        }
    };

    btnUse.onclick = async () => {
        if(!window.selectedFile) return;
        
        progress.classList.remove("hidden");
        const messages = ["Escaneando follaje...", "Analizando salud...", "Identificando especie...", "Preparando consejos..."];
        let i = 0;
        const interval = setInterval(() => {
            loadingMsg.innerText = messages[i % messages.length];
            i++;
        }, 1500);

        const fd = new FormData();
        fd.append("image", window.selectedFile);

        try {
            const r = await fetch("/identify", { method: "POST", body: fd });
            const d = await r.json();
            
            if(d.ok) {
                const info = d.result;
                saveToHistory(info);

                const waMsg = `Hola%20Chinampa!%20🌿%0A%0AAcabo%20de%20escanear%20esta%20planta%20con%20tu%20App:%0A✅%20*${info.nombre_comun}*%0A🧬%20_${info.nombre_cientifico}_`;
                
                document.getElementById("results").innerHTML = `
                    <div class="result-card">
                        <h2 style="color:var(--primary); margin-bottom:5px;">${info.nombre_comun}</h2>
                        <p style="margin-top:0;"><i>${info.nombre_cientifico}</i></p>
                        <div class="warning-box">
                            <strong>🩺 Diagnóstico:</strong> ${info.salud}<br>
                            <small>${info.advertencias}</small>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:20px 0;">
                            <div class="care-badge"><span>☀️</span><strong>Luz</strong><br>${info.sol || 'N/A'}</div>
                            <div class="care-badge"><span>💧</span><strong>Riego</strong><br>${info.riego || 'N/A'}</div>
                            <div class="care-badge"><span>🪴</span><strong>Tierra</strong><br>${info.sustrato || 'N/A'}</div>
                        </div>
                        <h3>💡 Tips del Experto Chinampa:</h3>
                        <ul class="tips-list">
                            ${info.consejos.map(t => `<li>${t}</li>`).join('')}
                        </ul>
                        <ul style="padding-left:20px;">${info.consejos.map(t => `<li>${t}</li>`).join('')}</ul>
                        <a href="https://wa.me/525620238734?text=${waMsg}" target="_blank" class="btn-wa-premium">🛒 Consultar Existencia</a>
                        <button onclick="location.reload()" class="primary" style="margin-top:10px; background:#666;">Nueva consulta</button>
                    </div>`;
                
                document.getElementById("results").scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Error: " + d.error);
            }
        } catch (e) {
            alert("Hubo un problema con la conexión.");
        } finally {
            clearInterval(interval);
            progress.classList.add("hidden");
        }
    };

    updateSeasonBanner();
    renderHistory();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('Chinampa SW registrado'))
                .catch(err => console.log('Error SW:', err));
        });
    }
</script>
</body>
</html>
